db = "/usr/src/app/strfry-db/"

dbParams {
    mapsize = 1073741824
}

relay {
    bind = "0.0.0.0"
    port = 7777

    nofiles = 0

    info {
        name = "FIPS LAN Demo Relay"
        description = "Local relay for the UDP hole-punch LAN demo."
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpNoDelay = false

    rejectFutureEventsSeconds = 900
    rejectEphemeralEventsOlderThanSeconds = 60
    rejectEventsNewerThanSeconds = 900

    maxFilterLimit = 500
    maxSubsPerConnection = 20

    writePolicy {
        plugin = ""
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }

    numThreads {
        ingester = 2
        reqWorker = 2
        reqMonitor = 2
        negentropy = 1
    }

    negentropy {
        enabled = true
        maxSyncEvents = 100000
    }
}
